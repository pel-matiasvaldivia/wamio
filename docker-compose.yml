name: wamio

networks:
  wamio_net:
    driver: bridge

volumes:
  wamio_postgres_data:
  wamio_redis_data:
  wamio_evolution_instances:
  wamio_n8n_data:
  wamio_directus_uploads:
  wamio_chatwoot_storage:

services:

  # ============================================================
  # LANDING + ROUTER PÚBLICO (único punto de entrada del dominio)
  # NPM apunta https://wamio.pymesenlinea.com.ar -> wamio_landing:8080.
  # Reparte:  /  -> landing · /admin -> Directus · /n8n -> n8n · /api -> Evolution
  # ============================================================
  landing:
    image: ghcr.io/pel-matiasvaldivia/wamio/landing:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/landing.Dockerfile
    container_name: wamio_landing
    restart: unless-stopped
    ports:
      # Puerto local para probar/depurar directo; en producción entra por NPM.
      - "8060:8080"
    depends_on:
      - directus
      - n8n
      - evolution-api
    networks:
      - wamio_net

  # ============================================================
  # BASE DE DATOS COMPARTIDA
  # ============================================================
  postgres:
    image: ghcr.io/pel-matiasvaldivia/wamio/postgres:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/postgres.Dockerfile
    container_name: wamio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      # Misma zona horaria que n8n para que los cálculos de turnos
      # (TIMESTAMPTZ vs TIME de horarios_disponibilidad) no se corran 3 horas.
      TZ: America/Argentina/Mendoza
      PGTZ: America/Argentina/Mendoza
    volumes:
      - wamio_postgres_data:/var/lib/postgresql/data
    networks:
      - wamio_net
    healthcheck:
      # -d postgres evita el FATAL "database <usuario> does not exist" que
      # pg_isready dispara al conectar por defecto a una base con el nombre
      # del usuario (ruido inofensivo pero confuso en los logs).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: ghcr.io/pel-matiasvaldivia/wamio/redis:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/redis.Dockerfile
    container_name: wamio_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      # redis-cli la toma automáticamente: evita pasar la clave por argumento
      # (visible en `docker inspect`) y el warning en cada healthcheck.
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    volumes:
      - wamio_redis_data:/data
    networks:
      - wamio_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # GATEWAY DE WHATSAPP
  # ============================================================
  evolution-api:
    # La versión upstream se pinea en docker/evolution-api.Dockerfile;
    # actualizar a conciencia, no con `docker compose pull` a ciegas.
    image: ghcr.io/pel-matiasvaldivia/wamio/evolution-api:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/evolution-api.Dockerfile
    container_name: wamio_evolution_api
    restart: unless-stopped
    ports:
      - "8054:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      # URL pública del gateway (para armar links de QR/media). Se sirve bajo /api.
      SERVER_URL: ${WAMIO_PUBLIC_URL}/api
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://:${REDIS_PASSWORD}@redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"
      # Webhook interno hacia n8n. Como n8n corre bajo el prefijo /n8n/, la ruta
      # interna también lo lleva (N8N_PATH monta TODO —incluidos webhooks— ahí).
      WEBHOOK_GLOBAL_URL: http://n8n:5678/n8n/webhook/wamio-whatsapp-in
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "true"
    volumes:
      - wamio_evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wamio_net

  # ============================================================
  # ORQUESTADOR (catálogo, turnos, pagos, recordatorios)
  # ============================================================
  n8n:
    image: ghcr.io/pel-matiasvaldivia/wamio/n8n:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/n8n.Dockerfile
    container_name: wamio_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PORT: 5678
      # n8n se sirve bajo /n8n/ detrás del router. Con N8N_PATH monta el editor,
      # las APIs y los webhooks bajo ese prefijo y arma bien todos los links.
      N8N_PATH: /n8n/
      N8N_EDITOR_BASE_URL: ${WAMIO_PUBLIC_URL}/n8n/
      WEBHOOK_URL: ${WAMIO_PUBLIC_URL}/n8n/
      N8N_PROXY_HOPS: 1
      GENERIC_TIMEZONE: America/Argentina/Mendoza
      TZ: America/Argentina/Mendoza
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      # Permite usar {{ $env.MP_ACCESS_TOKEN }} y compañía en expresiones de nodos.
      # n8n >= 1.x lo bloquea por defecto.
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # Credenciales que van a usar los nodos HTTP dentro de los flujos
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      WAMIO_DB_HOST: postgres
      WAMIO_DB_NAME: wamio
      WAMIO_DB_USER: ${POSTGRES_USER}
      WAMIO_DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - wamio_n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wamio_net

  # ============================================================
  # PANEL ADMIN PARA EL DUEÑO DEL COMERCIO (productos, turnos, precios)
  # ============================================================
  directus:
    image: ghcr.io/pel-matiasvaldivia/wamio/directus:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/directus.Dockerfile
    container_name: wamio_directus
    restart: unless-stopped
    ports:
      - "8055:8055"
    environment:
      SECRET: ${DIRECTUS_SECRET}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      # Se sirve bajo /admin detrás del router: Directus arma sus assets y links
      # con este prefijo. El router le quita /admin/ antes de pasarle el request.
      PUBLIC_URL: ${WAMIO_PUBLIC_URL}/admin
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: wamio
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_ENABLED: "true"
      CACHE_STORE: redis
      REDIS: redis://:${REDIS_PASSWORD}@redis:6379/2
      WEBSOCKETS_ENABLED: "true"
    volumes:
      - wamio_directus_uploads:/directus/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wamio_net

  # ============================================================
  # BANDEJA DE ATENCIÓN HUMANA (opcional)
  # Levantar con: docker compose --profile chatwoot up -d
  # ============================================================
  chatwoot:
    image: ghcr.io/pel-matiasvaldivia/wamio/chatwoot:${WAMIO_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/chatwoot.Dockerfile
    container_name: wamio_chatwoot
    restart: unless-stopped
    profiles: ["chatwoot"]
    ports:
      - "3056:3000"
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      DEFAULT_LOCALE: es
      FORCE_SSL: "false"
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
    volumes:
      - wamio_chatwoot_storage:/app/storage
    command: >
      sh -c "bundle exec rails db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wamio_net

  chatwoot_sidekiq:
    image: ghcr.io/pel-matiasvaldivia/wamio/chatwoot:${WAMIO_IMAGE_TAG:-latest}
    container_name: wamio_chatwoot_sidekiq
    restart: unless-stopped
    profiles: ["chatwoot"]
    environment:
      RAILS_ENV: production
      NODE_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE}
      FRONTEND_URL: ${CHATWOOT_FRONTEND_URL}
      POSTGRES_HOST: postgres
      POSTGRES_USERNAME: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
    volumes:
      - wamio_chatwoot_storage:/app/storage
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    depends_on:
      - chatwoot
    networks:
      - wamio_net
