# Wamio — punto de entrada único detrás del reverse proxy (NPM).
# NPM apunta el dominio público (https://wamio.pymesenlinea.com.ar) a este
# contenedor (wamio_landing:8080) y acá adentro se reparte cada ruta:
#
#   /            -> landing (marketing, home exacta)
#   /n8n/        -> n8n (automatizaciones; conoce su prefijo vía N8N_PATH)
#   /api/        -> Evolution API (REST del gateway)
#   todo lo demás-> Directus (panel en /admin + su API en la raíz: /auth,
#                   /server, /items, /extensions, /assets, /graphql, ...)
#
# Por qué Directus es el "catch-all": su panel vive en /admin pero la SPA llama
# a la API en la RAÍZ (/auth, /server/info, /extensions...). Si recortáramos el
# prefijo /admin, esas llamadas caerían en la landing y darían 404. Dejando a
# Directus como app por defecto, esas rutas resuelven bien y la landing ocupa
# solo la home exacta.
#
# El resolver de Docker (127.0.0.11) se usa con variables en proxy_pass para
# que nginx arranque aunque un upstream todavía no esté listo (devuelve 502 en
# vez de negarse a iniciar).

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Cuerpos grandes: subida de imágenes de productos en Directus.
    client_max_body_size 50m;

    # ---------- Landing (SOLO la home exacta) ----------
    # index.html es autocontenido (CSS inline), no necesita servir otros assets.
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Salud del propio router (para NPM / monitoreo).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---------- Panel del comercio (SPA) ----------
    # App web simple que consume la API de Directus (que está en la raíz).
    location /app/ {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /app/index.html;   # fallback SPA
    }
    location = /app { return 301 /app/; }

    # ---------- n8n (automatizaciones) ----------
    # n8n conoce su prefijo vía N8N_PATH=/n8n/, así que NO se quita el prefijo.
    location /n8n/ {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Los flujos (importar/exportar, ejecuciones largas) necesitan tiempo.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Evolution API (REST del gateway) ----------
    # Se le quita el prefijo /api/. La consola visual (Manager) se accede por el
    # puerto del servidor (ver GUIA.md), no por acá.
    location = /api { return 301 /api/; }
    location /api/ {
        set $up_evo http://evolution-api:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $up_evo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Directus (app por defecto: panel /admin + API en la raíz) ----------
    location / {
        set $up_directus http://directus:8055;
        proxy_pass $up_directus;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
