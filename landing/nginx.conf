# Wamio — punto de entrada único detrás del reverse proxy (NPM).
# NPM apunta el dominio público (https://wamio.pymesenlinea.com.ar) a este
# contenedor (wamio_landing:8080) y acá adentro se reparte cada ruta:
#
#   /         -> landing (marketing, lo primero que ve el visitante)
#   /admin/   -> Directus  (panel del comercio: productos, turnos, precios)
#   /n8n/     -> n8n       (automatizaciones: catálogo, turnos, pagos)
#   /api/     -> Evolution API (REST del gateway de WhatsApp)
#
# El resolver de Docker (127.0.0.11) se usa con variables en proxy_pass para
# que nginx arranque aunque un upstream todavía no esté listo (devuelve 502 en
# vez de negarse a iniciar).

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;

    # Cuerpos grandes: subida de imágenes de productos en Directus.
    client_max_body_size 50m;

    # ---------- Landing (raíz) ----------
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ---------- Directus (panel admin) ----------
    # Se le quita el prefijo /admin/; Directus genera sus links con PUBLIC_URL.
    location = /admin { return 301 /admin/; }
    location /admin/ {
        set $up_directus http://directus:8055;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass $up_directus;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # ---------- n8n (automatizaciones) ----------
    # n8n conoce su prefijo vía N8N_PATH=/n8n/, así que NO se quita el prefijo.
    location /n8n/ {
        set $up_n8n http://n8n:5678;
        proxy_pass $up_n8n;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Los flujos (importar/exportar, ejecuciones largas) necesitan tiempo.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---------- Evolution API (REST del gateway) ----------
    # Se le quita el prefijo /api/. La consola visual (Manager) se accede por el
    # puerto del servidor (ver GUIA.md), no por acá.
    location = /api { return 301 /api/; }
    location /api/ {
        set $up_evo http://evolution-api:8080;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $up_evo;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Salud del propio router (para NPM / monitoreo).
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
